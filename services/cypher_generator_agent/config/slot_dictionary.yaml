entities:
  service:
    synonyms: ["服务", "业务"]
  tunnel:
    synonyms: ["隧道"]
  network_element:
    synonyms: ["网络设备", "网元", "设备"]
  port:
    synonyms: ["端口", "接口"]
  link:
    synonyms: ["链路", "连接"]
  fiber:
    synonyms: ["光纤", "纤芯"]
  protocol:
    synonyms: ["协议"]

properties:
  id:
    synonyms: ["ID", "id", "标识", "编号"]
  name:
    synonyms: ["名称", "名字"]
  status:
    synonyms: ["状态"]
  admin_status:
    synonyms: ["管理状态", "admin 状态"]
  vendor:
    synonyms: ["厂商", "厂家"]
  bandwidth:
    synonyms: ["带宽"]
  bandwidth_capacity:
    synonyms: ["带宽容量", "容量"]
  latency:
    synonyms: ["时延", "延迟"]
  length:
    synonyms: ["长度"]
  quality_of_service:
    synonyms: ["QoS", "QOS", "服务等级", "服务质量"]
  elem_type:
    synonyms: ["类型", "类别"]
  speed:
    synonyms: ["速率", "速度"]
  location:
    synonyms: ["位置", "地点"]
  protocol:
    synonyms: ["协议"]

relationships:
  service_uses_tunnel:
    synonyms: ["使用", "承载于", "依赖"]
  has_port:
    synonyms: ["拥有", "包含", "有哪些端口"]
  path_through:
    synonyms: ["经过", "路径经过", "途经"]
  tunnel_src:
    synonyms: ["源端", "起点", "源设备"]
  tunnel_dst:
    synonyms: ["目的端", "终点", "目的设备"]
  link_src:
    synonyms: ["链路源端"]
  link_dst:
    synonyms: ["链路目的端"]
  fiber_src:
    synonyms: ["光纤源端"]
  fiber_dst:
    synonyms: ["光纤目的端"]

values:
  quality_of_service:
    Gold: ["Gold", "gold", "金牌"]
    Silver: ["Silver", "silver", "银牌"]
    Bronze: ["Bronze", "bronze", "铜牌"]
    Best_Effort: ["Best_Effort", "best effort", "尽力而为"]
  status:
    up: ["up", "UP", "正常"]
    down: ["down", "DOWN", "故障", "异常"]
    administratively_down: ["administratively_down", "管理关闭"]
  admin_status:
    up: ["up", "UP", "正常"]
    down: ["down", "DOWN", "关闭"]
    testing: ["testing", "测试"]

default_filter_entity:
  quality_of_service: service

entity_properties:
  service: ["id", "name", "quality_of_service", "elem_type", "bandwidth", "latency"]
  tunnel: ["id", "name", "elem_type", "bandwidth", "latency", "ietf_standard"]
  network_element: ["id", "name", "vendor", "elem_type", "ip_address", "location", "model", "software_version"]
  port: ["id", "name", "status", "elem_type", "speed", "mac_address", "vlan_id"]
  link: ["id", "name", "status", "admin_status", "elem_type", "bandwidth", "latency", "mtu", "protocol", "vlan_id"]
  fiber: ["id", "name", "elem_type", "length", "location", "wavelength", "bandwidth_capacity"]
  protocol: ["id", "name", "version", "standard", "ietf_category"]

metric_templates:
  count:
    synonyms: ["数量", "总数", "多少个"]
  avg:
    synonyms: ["平均", "平均值"]
  max:
    synonyms: ["最大", "最高"]
  min:
    synonyms: ["最小", "最低"]
  sum:
    synonyms: ["总和", "合计"]

order:
  desc: ["最高", "最大", "最多", "降序"]
  asc: ["最低", "最小", "最少", "升序"]

group_by:
  prefixes: ["按", "按照", "基于"]

limit:
  patterns:
    - "前\\s*(\\d+)\\s*个"
    - "top\\s*(\\d+)"
    - "Top\\s*(\\d+)"
    - "TOP\\s*(\\d+)"
