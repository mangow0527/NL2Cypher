version: 1
source_schema: services/testing_agent/docs/reference/schema.json
description: Operation intent mention dictionary for first-stage operation cue extraction.
entries:
  - canonical_id: OP_QUERY
    mention_type: operation_intent
    surface_forms: [查询, 查找, 查看, 列出, 获取, 显示, search, query, list, show, get]
    description: Retrieve records or fields.
    intent: record_retrieval_query

  - canonical_id: OP_DETAIL
    mention_type: operation_intent
    surface_forms: [详情, 详细信息, 节点信息, 全部信息, detail, details]
    description: Ask for full object details.
    intent: entity_detail_query

  - canonical_id: OP_COUNT
    mention_type: operation_intent
    surface_forms: [统计, 数量, 总数, 多少, 计数, count, total, number of]
    description: Count records or values.
    intent: metric_query

  - canonical_id: OP_GROUP_BY
    mention_type: operation_intent
    surface_forms: [按, 分组, 分布, 各, 每个, group by, breakdown, distribution, per]
    description: Group results by a dimension.
    intent: breakdown_query

  - canonical_id: OP_RANK
    mention_type: operation_intent
    surface_forms: [排名, 排序, 前, top, Top, TOP, 最多, 最少, 最高, 最低, 最大, 最小, ranking, rank]
    description: Rank, top-k, or bottom-k query.
    intent: ranking_query

  - canonical_id: OP_SORT_ASC
    mention_type: operation_intent
    surface_forms: [升序, 从小到大, 递增, ascending, asc]
    description: Ascending ordering cue.
    intent: sort_ascending

  - canonical_id: OP_SORT_DESC
    mention_type: operation_intent
    surface_forms: [降序, 从大到小, 递减, descending, desc]
    description: Descending ordering cue.
    intent: sort_descending

  - canonical_id: OP_LIMIT
    mention_type: operation_intent
    surface_forms: [前几个, 前N个, 前5个, top N, limit, 限制, 返回前]
    description: Limit result count.
    intent: limit_query

  - canonical_id: OP_EXISTENCE
    mention_type: operation_intent
    surface_forms: [是否存在, 有没有, 是否有, 是否, 存在, exists, existence]
    description: Existence check.
    intent: existence_query

  - canonical_id: OP_FILTER
    mention_type: operation_intent
    surface_forms: [为, 是, 等于, 大于, 小于, 不等于, 满足, 过滤, filter, where, equals, greater than, less than]
    description: Filter condition cue.
    intent: filter_condition

  - canonical_id: OP_RELATIONSHIP_PATH
    mention_type: operation_intent
    surface_forms: [关系, 对应关系, 关联, 连接, 路径, 经过, 使用, 到达, path, relationship, related, connected]
    description: Relationship or path query cue.
    intent: relationship_path_query

  - canonical_id: OP_RETURN_FIELD
    mention_type: operation_intent
    surface_forms: [返回, 输出, 展示, return field, projection]
    description: Requested projection or returned field cue.
    intent: attribute_projection_query
