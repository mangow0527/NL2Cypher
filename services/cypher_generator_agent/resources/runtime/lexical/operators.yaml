version: 1
description: Structured comparison operators extracted beside mention dictionaries.

operators:
  - canonical_id: OP_EQ
    surface_forms: [等于, 为, 是, "="]
    cypher_op: "="
    applies_to: [string, numeric, datetime]
    arity: 1

  - canonical_id: OP_NE
    surface_forms: [不等于, 不是, "!=", "<>"]
    cypher_op: "<>"
    applies_to: [string, numeric, datetime]
    arity: 1

  - canonical_id: OP_GT
    surface_forms: [大于, 高于, 超过, ">"]
    cypher_op: ">"
    applies_to: [numeric, datetime]
    arity: 1

  - canonical_id: OP_GTE
    surface_forms: [大于等于, 不小于, 不低于, 至少, ">="]
    cypher_op: ">="
    applies_to: [numeric, datetime]
    arity: 1

  - canonical_id: OP_LT
    surface_forms: [小于, 低于, 少于, "<"]
    cypher_op: "<"
    applies_to: [numeric, datetime]
    arity: 1

  - canonical_id: OP_LTE
    surface_forms: [小于等于, 不大于, 不超过, 至多, "<="]
    cypher_op: "<="
    applies_to: [numeric, datetime]
    arity: 1

  - canonical_id: OP_BETWEEN
    surface_forms: [介于, 在]
    cypher_op: BETWEEN
    applies_to: [numeric, datetime]
    arity: 2
