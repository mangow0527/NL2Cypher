version: 1
description: Lexical literal and time-expression extractor rules.
patterns:
- canonical_id: LITERAL_IPV4
  value_type: ipv4
  regex: (?<![A-Za-z0-9_.])(?:\d{1,3}\.){3}\d{1,3}(?![A-Za-z0-9_.])
- canonical_id: LITERAL_QUOTED_STRING
  value_type: string
  regex: '"[^"]+"|''[^'']+''|“[^”]+”|‘[^’]+’'
- canonical_id: LITERAL_RUNTIME
  value_type: numeric_with_optional_unit
  regex: (?<![A-Za-z0-9_.])\d+(?:\.\d+)?\s*(?:ms|毫秒|s|秒|Mbps|Gbps|%)?(?![A-Za-z0-9_.])
- canonical_id: LITERAL_DATE
  value_type: date
  regex: \d{4}[-/年]\d{1,2}(?:[-/月]\d{1,2}日?)?
- canonical_id: LITERAL_IDENTIFIER
  value_type: identifier
  regex: (?<![A-Za-z0-9_])[A-Za-z][A-Za-z0-9]+_[A-Za-z0-9_]+(?![A-Za-z0-9_])
- canonical_id: TIME_RECENT_N_DAYS
  mention_type: TIME_EXPRESSION
  value_type: relative_time
  regex: 最近\s*\d+\s*天
