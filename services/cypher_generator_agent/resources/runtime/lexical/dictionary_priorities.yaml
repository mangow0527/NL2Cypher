version: 1
description: Type-level priority table for lexer overlap resolution.
override_semantics: replace

match_source_priorities:
  ac_exact: 100
  vector_recall: 50
  llm_select: 40

dictionary_priorities:
  by_type:
    relation_predicate: 100
    attribute: 90
    business_object: 80
    attribute_value: 70
    operation_intent: 60

  by_canonical_id:
    REL_FIBER_SRC: 105
    REL_FIBER_DST: 105
    REL_LINK_SRC: 105
    REL_LINK_DST: 105
    REL_TUNNEL_SRC: 105
    REL_TUNNEL_DST: 105

  ci_rules:
    max_overrides: 10
    role_relation_must_override:
      pattern: "^REL_.*_(SRC|DST|PRIMARY|BACKUP|IN|OUT|START|END)$"
      min_priority: 105
    synonym_normalization_required: true
