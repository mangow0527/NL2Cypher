# 自然语言问题预处理：噪声处理配置
#
# 用于第 6 步“噪声处理”。这里只维护可安全删除的表达包装和非业务风格规范化。

version: 1
resource_id: noise_handling_rules
name_zh: 自然语言问题噪声处理规则

remove_phrases:
  - id: wrapper_then_you_need_give_me
    text: 然后你需要给我
    kind: expression_wrapper
  - id: wrapper_you_need_give_me
    text: 你需要给我
    kind: expression_wrapper
  - id: wrapper_please_give_me
    text: 请给我
    kind: expression_wrapper
  - id: wrapper_convenient_for_you
    text: 你这边方便的话
    kind: expression_wrapper
  - id: wrapper_result_only
    text: 这个结果给我就可以
    kind: expression_wrapper
  - id: wrapper_help_me_look_only
    text: 这个你帮我看一下就行
    kind: expression_wrapper
  - id: wrapper_other_later
    text: 其他的后面再说
    kind: expression_wrapper
  - id: wrapper_yes_this_one
    text: 对，就这个
    kind: expression_wrapper
  - id: wrapper_a_bit_urgent
    text: 稍微急一点
    kind: expression_wrapper
  - id: politeness_trouble_particle
    text: 麻烦了哈
    kind: politeness
  - id: politeness_trouble
    text: 麻烦了
    kind: politeness
  - id: politeness_thanks_particle
    text: 谢谢啦
    kind: politeness
  - id: politeness_thanks
    text: 谢谢
    kind: politeness

remove_patterns:
  # 通用重复话题包装，例如：
  # “我们现在看端口这块，嗯还是端口这块，麻烦查询端口名称”
  # 这里只识别重复表达结构，不在配置里维护任何业务词。
  - id: wrapper_repeated_context
    pattern: 我们现在看(?P<topic>[^，,。！？；]{1,20})这块，嗯还是(?P=topic)这块，麻烦
    kind: expression_wrapper

pronoun_prefix_normalizations:
  - id: pronoun_style_normalization_his
    rule: pronoun_style_normalization
    from_prefix: 他的
    to_prefix: 其
    reason: non_business_style_normalization

strip_trailing_punctuation:
  - ，
  - 。
  - ！
  - ？
  - ;
  - ；

strip_trailing_particles:
  - 吧
  - 哈
