# 自然语言问题预处理：请求文本安全准入规则
#
# 用于第 0 步“请求文本安全准入”。
# 这里只维护工程安全规则，不判断问题是否清晰，也不改写用户问题。

version: 1
resource_id: input_guard_rules
name_zh: 自然语言问题输入安全准入规则

max_original_question_chars: 512

control_char_policy:
  # 允许用户输入中的常见空白控制符进入文本清洗阶段。
  allow:
    - "\t"
    - "\n"
    - "\r"
  # Cc: 控制字符；Cf: 格式控制字符，例如零宽字符。
  reject_categories:
    - Cc
    - Cf
  explicit_reject:
    - "\u0000"

rejection_reasons:
  input_too_long:
    reason: 输入文本超过系统可安全处理的长度上限。
    user_message: 问题过长，请拆分或缩短后重新输入。
  invalid_control_character:
    reason: 输入文本包含不可见控制字符。
    user_message: 输入包含不可见控制字符，请删除后重新输入。
  invalid_input_type:
    reason: 输入不是文本。
    user_message: 请输入文本形式的问题。
