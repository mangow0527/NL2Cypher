version: 1
metadata:
  target: tugraph_cypher
  ontology_version: 1
  physical_schema_version: 1

class_mappings:
  - ontology_class: Service
    node_label: Service
    variable: s
  - ontology_class: Tunnel
    node_label: Tunnel
    variable: t
  - ontology_class: NetworkElement
    node_label: NetworkElement
    variable: ne
  - ontology_class: Port
    node_label: Port
    variable: p
  - ontology_class: Protocol
    node_label: Protocol
    variable: proto

attribute_mappings:
  - ontology_attribute: Service.id
    node_property: id
  - ontology_attribute: Service.name
    node_property: name
  - ontology_attribute: Service.bandwidth
    node_property: bandwidth
  - ontology_attribute: Service.latency
    node_property: latency
  - ontology_attribute: Service.quality_of_service
    node_property: quality_of_service
  - ontology_attribute: Service.elem_type
    node_property: elem_type
  - ontology_attribute: Tunnel.name
    node_property: name
  - ontology_attribute: Tunnel.id
    node_property: id
  - ontology_attribute: Tunnel.ietf_standard
    node_property: ietf_standard
  - ontology_attribute: Tunnel.bandwidth
    node_property: bandwidth
  - ontology_attribute: Tunnel.latency
    node_property: latency
  - ontology_attribute: Tunnel.elem_type
    node_property: elem_type
  - ontology_attribute: NetworkElement.name
    node_property: name
  - ontology_attribute: NetworkElement.id
    node_property: id
  - ontology_attribute: NetworkElement.elem_type
    node_property: elem_type
  - ontology_attribute: NetworkElement.ip_address
    node_property: ip_address
  - ontology_attribute: NetworkElement.location
    node_property: location
  - ontology_attribute: NetworkElement.model
    node_property: model
  - ontology_attribute: NetworkElement.software_version
    node_property: software_version
  - ontology_attribute: NetworkElement.vendor
    node_property: vendor
  - ontology_attribute: Port.name
    node_property: name
  - ontology_attribute: Port.id
    node_property: id
  - ontology_attribute: Port.elem_type
    node_property: elem_type
  - ontology_attribute: Port.speed
    node_property: speed
  - ontology_attribute: Port.mac_address
    node_property: mac_address
  - ontology_attribute: Port.status
    node_property: status
  - ontology_attribute: Port.vlan_id
    node_property: vlan_id
  - ontology_attribute: Protocol.id
    node_property: id
  - ontology_attribute: Protocol.name
    node_property: name
  - ontology_attribute: Protocol.ietf_category
    node_property: ietf_category
  - ontology_attribute: Protocol.standard
    node_property: standard
  - ontology_attribute: Protocol.version
    node_property: version

relation_mappings:
  - ontology_relation: SERVICE_USES_TUNNEL
    edge_type: SERVICE_USES_TUNNEL
    direction: outgoing
  - ontology_relation: TUNNEL_SRC
    edge_type: TUNNEL_SRC
    direction: outgoing
  - ontology_relation: TUNNEL_DST
    edge_type: TUNNEL_DST
    direction: outgoing
  - ontology_relation: PATH_THROUGH
    edge_type: PATH_THROUGH
    direction: outgoing
  - ontology_relation: HAS_PORT
    edge_type: HAS_PORT
    direction: outgoing
  - ontology_relation: TUNNEL_PROTO
    edge_type: TUNNEL_PROTO
    direction: outgoing
