version: 1
metadata:
  ontology_version: 1
  owner: cypher_generator_agent

classes:
  - id: Service
  - id: Tunnel
  - id: NetworkElement
  - id: Port
  - id: Protocol
  - id: Fiber
  - id: Link

relations:
  - id: SERVICE_USES_TUNNEL
    domain: Service
    range: Tunnel
    allowed_directions: [outgoing]
  - id: TUNNEL_SRC
    domain: Tunnel
    range: NetworkElement
    role: source
    allowed_directions: [outgoing]
  - id: TUNNEL_DST
    domain: Tunnel
    range: NetworkElement
    role: destination
    allowed_directions: [outgoing]
  - id: PATH_THROUGH
    domain: Tunnel
    range: NetworkElement
    role: through
    allowed_directions: [outgoing]
  - id: HAS_PORT
    domain: NetworkElement
    range: Port
    allowed_directions: [outgoing]
  - id: TUNNEL_PROTO
    domain: Tunnel
    range: Protocol
    allowed_directions: [outgoing]
  - id: FIBER_SRC
    domain: Fiber
    range: Port
    role: source
    allowed_directions: [outgoing]
  - id: FIBER_DST
    domain: Fiber
    range: Port
    role: destination
    allowed_directions: [outgoing]
  - id: LINK_SRC
    domain: Link
    range: Port
    role: source
    allowed_directions: [outgoing]
  - id: LINK_DST
    domain: Link
    range: Port
    role: destination
    allowed_directions: [outgoing]

attributes:
  - id: NetworkElement.id
    parent_class: NetworkElement
  - id: NetworkElement.ip_address
    parent_class: NetworkElement
  - id: NetworkElement.location
    parent_class: NetworkElement
  - id: NetworkElement.model
    parent_class: NetworkElement
  - id: NetworkElement.name
    parent_class: NetworkElement
  - id: NetworkElement.software_version
    parent_class: NetworkElement
  - id: NetworkElement.elem_type
    parent_class: NetworkElement
  - id: NetworkElement.vendor
    parent_class: NetworkElement
  - id: Protocol.id
    parent_class: Protocol
  - id: Protocol.ietf_category
    parent_class: Protocol
  - id: Protocol.name
    parent_class: Protocol
  - id: Protocol.standard
    parent_class: Protocol
  - id: Protocol.version
    parent_class: Protocol
  - id: Tunnel.bandwidth
    parent_class: Tunnel
  - id: Tunnel.latency
    parent_class: Tunnel
  - id: Tunnel.id
    parent_class: Tunnel
  - id: Tunnel.ietf_standard
    parent_class: Tunnel
  - id: Tunnel.name
    parent_class: Tunnel
  - id: Tunnel.elem_type
    parent_class: Tunnel
  - id: Service.bandwidth
    parent_class: Service
  - id: Service.latency
    parent_class: Service
  - id: Service.id
    parent_class: Service
  - id: Service.name
    parent_class: Service
  - id: Service.quality_of_service
    parent_class: Service
  - id: Service.elem_type
    parent_class: Service

values:
  - id: NetworkElementType.router
    constrains_attribute: NetworkElement.elem_type
  - id: NetworkElementType.switch
    constrains_attribute: NetworkElement.elem_type
  - id: NetworkElementType.firewall
    constrains_attribute: NetworkElement.elem_type
  - id: NetworkElementType.load_balancer
    constrains_attribute: NetworkElement.elem_type
  - id: NetworkElementType.wan_optimizer
    constrains_attribute: NetworkElement.elem_type
  - id: ServiceQuality.Gold
    constrains_attribute: Service.quality_of_service
  - id: ServiceQuality.Silver
    constrains_attribute: Service.quality_of_service
  - id: ServiceQuality.Bronze
    constrains_attribute: Service.quality_of_service
  - id: ServiceQuality.Best_Effort
    constrains_attribute: Service.quality_of_service

default_paths:
  - id: DP_SERVICE_TO_SOURCE_NE
    from_class: Service
    to_class: NetworkElement
    relation_chain: [SERVICE_USES_TUNNEL, TUNNEL_SRC]
    confidence: confirmed
  - id: DP_SERVICE_TO_PORT_REVIEW
    from_class: Service
    to_class: Port
    relation_chain: [SERVICE_USES_TUNNEL, TUNNEL_SRC, HAS_PORT]
    confidence: needs_review
