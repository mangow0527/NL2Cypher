version: 1
metadata:
  ontology_version: 1

constraints:
  - id: return_items_required
    description: Every logical plan must return at least one projection or metric.
    severity: error
    type: return_non_empty

  - id: projection_attributes_must_exist
    description: Projection attributes must exist in mention-backed ontology assets.
    severity: error
    type: projection_attribute_exists

relation_cardinality:
  - relation: SERVICE_USES_TUNNEL
    from_side:
      value: n
      source: human_rule
      confidence: needs_review
    to_side:
      value: n
      source: human_rule
      confidence: needs_review
  - relation: TUNNEL_SRC
    from_side:
      value: "1"
      source: human_rule
      confidence: needs_review
    to_side:
      value: n
      source: schema
      confidence: confirmed
  - relation: TUNNEL_DST
    from_side:
      value: "1"
      source: human_rule
      confidence: needs_review
    to_side:
      value: n
      source: schema
      confidence: confirmed
  - relation: PATH_THROUGH
    from_side:
      value: n
      source: human_rule
      confidence: needs_review
    to_side:
      value: n
      source: human_rule
      confidence: needs_review
  - relation: HAS_PORT
    from_side:
      value: n
      source: schema
      confidence: confirmed
    to_side:
      value: "1"
      source: human_rule
      confidence: needs_review
