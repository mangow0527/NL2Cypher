version: 1
description: Fixed human-maintained rules used by tools/generate_mention_dictionaries.py.
include_id_attributes:
  - NetworkElement.id
  - Protocol.id
  - Tunnel.id
  - Service.id
  - Port.id
  - Fiber.id
  - Link.id

objects:
  NetworkElement:
    ontology_class: NetworkDevice
    surface_forms: [网元, 网络元素, 网络设备, 设备, NetworkElement, network element]
    description: Network element node, covering routers, switches, firewalls, load balancers, and WAN optimizers.
  Protocol:
    ontology_class: ProtocolDefinition
    surface_forms: [协议, 网络协议, 协议定义, Protocol, network protocol]
    description: Network protocol definition object.
  Tunnel:
    ontology_class: NetworkTunnel
    surface_forms: [隧道, 网络隧道, Tunnel, network tunnel]
    description: Network tunnel instance; tunnel paths are represented through PATH_THROUGH edges.
  Service:
    ontology_class: BusinessService
    surface_forms: [服务, 业务, 业务服务, 网络服务, Service, business service, service layer]
    description: Business or service layer object carried by network resources.
  Port:
    ontology_class: NetworkPort
    surface_forms: [端口, 接口, 网络接口, Port, interface, physical interface, logical interface]
    description: Physical or logical interface on a network element.
  Fiber:
    ontology_class: PhysicalFiber
    surface_forms: [光纤, 纤芯, 光缆, Fiber, fiber optic cable, physical fiber]
    description: Physical fiber optic cable resource.
  Link:
    ontology_class: NetworkLink
    surface_forms: [链路, 连接, 网络链路, 物理链路, 逻辑链路, Link, network link, physical link, logical link]
    description: Logical or physical link between ports.

