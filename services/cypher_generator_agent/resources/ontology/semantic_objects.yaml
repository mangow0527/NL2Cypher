version: 1
metadata:
  ontology_version: 1
  owner: cypher_generator_agent

concepts:
  - id: gold_service
    mention_id: SEM_GOLD_SERVICE
    label: 金牌服务
    base_class: Service
    filters:
      - attribute: Service.quality_of_service
        value: ServiceQuality.Gold

traversals:
  - id: service_source_ne
    label: 服务源网元
    from_class: Service
    to_class: NetworkElement
    relation_chain: [REL_SERVICE_USES_TUNNEL, REL_TUNNEL_SRC]
  - id: service_tunnel_protocol
    label: 服务隧道协议
    from_class: Service
    to_class: Protocol
    relation_chain: [REL_SERVICE_USES_TUNNEL, REL_TUNNEL_PROTO]
