version: 1
metadata:
  target: tugraph
  source_schema: services/testing_agent/docs/reference/schema.json
  edit_policy: generated_do_not_edit

node_labels:
  - label: Service
    properties: [id, name, bandwidth, latency, quality_of_service, elem_type]
  - label: Tunnel
    properties: [id, name, bandwidth, latency, ietf_standard, elem_type]
  - label: NetworkElement
    properties: [id, name, ip_address, location, model, software_version, elem_type, vendor]
  - label: Port
    properties: [id, name, speed, mac_address, status, elem_type, vlan_id]
  - label: Protocol
    properties: [id, name, standard, ietf_category, version]

edge_types:
  - edge_type: SERVICE_USES_TUNNEL
    from: Service
    to: Tunnel
  - edge_type: TUNNEL_SRC
    from: Tunnel
    to: NetworkElement
  - edge_type: TUNNEL_DST
    from: Tunnel
    to: NetworkElement
  - edge_type: PATH_THROUGH
    from: Tunnel
    to: NetworkElement
  - edge_type: HAS_PORT
    from: NetworkElement
    to: Port
  - edge_type: TUNNEL_PROTO
    from: Tunnel
    to: Protocol

