disambiguation_rules: [{rule_id: destination_ne_prefers_tunnel_dst, name_zh: 目的网元优先解释为隧道目的端, positive_patterns: [目的网元, 目的端网元], negative_patterns: [经过网元, 源网元, 端口, 接口], prefer: service.tunnel_destination, reject: [service.tunnel_path, service.tunnel_source], explanation: 用户明确提到目的网元时，选择隧道目的端路径。}, {rule_id: source_ne_prefers_tunnel_src, name_zh: 源网元优先解释为隧道源端, positive_patterns: [源网元, 源端网元, 源网络元素, 源端网络元素], negative_patterns: [目的网元, 目的端网元, 经过网元, 穿过, 端口, 接口], prefer: service.tunnel_source, reject: [service.tunnel_path, service.tunnel_destination], explanation: 用户明确提到源网元或源端网络元素时，选择隧道源端路径。}, {rule_id: traversed_ne_prefers_path_through, name_zh: 所经穿过网元优先解释为路径经过网元, positive_patterns: [所经, 经过, 穿过, 路径中, 隧道路径], negative_patterns: [源网元, 源端网元, 目的网元, 目的端网元, 到达, 端口, 接口], prefer: service.tunnel_path, reject: [service.tunnel_source, service.tunnel_destination], explanation: 用户明确提到所经、经过、穿过或路径中时，选择隧道路径经过网元。}, {rule_id: destination_port_prefers_tunnel_dst_port, name_zh: 到达网元端口优先解释为目的端网元端口, positive_patterns: [
      到达网元下的端口, 目的网元端口, 目的端网元端口, 目的网元下的端口], negative_patterns: [源网元, 源端网元, 经过网元, 穿过], prefer: service.tunnel_destination_ports, reject: [service.tunnel_path_ports, service.tunnel_source_ports], explanation: 用户明确提到到达网元或目的网元下的端口时，选择目的端网元端口路径。}, {rule_id: source_port_prefers_tunnel_src_port, name_zh: 源网元端口优先解释为源端网元端口, positive_patterns: [源网元端口, 源网元端口信息, 源网络元素端口, 源端网络元素上的端口, 源端网元上的端口, 源网元厂商和端口, 源网元厂商和端口MAC地址], negative_patterns: [目的网元, 目的端网元, 经过网元, 穿过], prefer: service.tunnel_source_ports, reject: [service.tunnel_path_ports, service.tunnel_destination_ports], explanation: 用户明确提到源端网元端口时，选择源端网元端口路径。}]
