version: 1
view_id: network_graph_semantic_view
name_zh: 网络图语义视图
description: 面向网络资源、隧道、服务、链路、端口、光纤和协议查询的受治理语义视图。

entities:
  network_element:
    name_zh: 网元
    label: NetworkElement
    alias: ne
    description: 网络中的设备或网元节点。
    synonyms: [网元, 网络元素, 网络设备, 设备, 路由器, 交换机, 防火墙]
    primary_key: id
    display_fields: [id, name]
    default_order_by: name
  protocol:
    name_zh: 协议
    label: Protocol
    alias: proto
    description: 网络协议及其标准信息。
    synonyms: [协议, 网络协议]
    primary_key: id
    display_fields: [id, name]
    default_order_by: name
  tunnel:
    name_zh: 隧道
    label: Tunnel
    alias: t
    description: 承载业务流量的网络隧道。
    synonyms: [隧道, tunnel]
    primary_key: id
    display_fields: [id, name]
    default_order_by: name
  service:
    name_zh: 服务
    label: Service
    alias: s
    description: 网络上承载的业务或服务。
    synonyms: [服务, 业务]
    primary_key: id
    display_fields: [id, name]
    default_order_by: name
  port:
    name_zh: 端口
    label: Port
    alias: p
    description: 网元上的物理或逻辑端口。
    synonyms: [端口, 接口]
    primary_key: id
    display_fields: [id, name]
    default_order_by: name
  fiber:
    name_zh: 光纤
    label: Fiber
    alias: f
    description: 连接端口的光纤资源。
    synonyms: [光纤, 纤芯]
    primary_key: id
    display_fields: [id, name]
    default_order_by: name
  link:
    name_zh: 链路
    label: Link
    alias: l
    description: 网络链路资源。
    synonyms: [链路]
    primary_key: id
    display_fields: [id, name]
    default_order_by: name

relationships:
  has_port:
    name_zh: 网元拥有端口
    from: network_element
    edge: HAS_PORT
    to: port
    direction: out
    description: 网元到其端口的归属关系。
    synonyms: [拥有端口, 包含端口]
  fiber_src:
    name_zh: 光纤源端口
    from: fiber
    edge: FIBER_SRC
    to: port
    direction: out
    description: 光纤连接的源端口。
    synonyms: [光纤源端]
  fiber_dst:
    name_zh: 光纤目的端口
    from: fiber
    edge: FIBER_DST
    to: port
    direction: out
    description: 光纤连接的目的端口。
    synonyms: [光纤目的端]
  link_src:
    name_zh: 链路源端口
    from: link
    edge: LINK_SRC
    to: port
    direction: out
    description: 链路连接的源端口。
    synonyms: [链路源端]
  link_dst:
    name_zh: 链路目的端口
    from: link
    edge: LINK_DST
    to: port
    direction: out
    description: 链路连接的目的端口。
    synonyms: [链路目的端]
  tunnel_src:
    name_zh: 隧道源网元
    from: tunnel
    edge: TUNNEL_SRC
    to: network_element
    direction: out
    description: 隧道的源端网元。
    synonyms: [隧道源端, 源网元]
  tunnel_dst:
    name_zh: 隧道目的网元
    from: tunnel
    edge: TUNNEL_DST
    to: network_element
    direction: out
    description: 隧道的目的端网元。
    synonyms: [隧道目的端, 目的网元]
  tunnel_proto:
    name_zh: 隧道协议
    from: tunnel
    edge: TUNNEL_PROTO
    to: protocol
    direction: out
    description: 隧道使用的协议。
    synonyms: [隧道协议, 使用协议]
  path_through:
    name_zh: 隧道经过网元
    from: tunnel
    edge: PATH_THROUGH
    to: network_element
    direction: out
    description: 隧道路由路径经过的网元。
    synonyms: [经过, 路径经过, 穿过]
  service_uses_tunnel:
    name_zh: 服务使用隧道
    from: service
    edge: SERVICE_USES_TUNNEL
    to: tunnel
    direction: out
    description: 服务承载在隧道上的关系。
    synonyms: [使用, 承载于, 依赖隧道]

