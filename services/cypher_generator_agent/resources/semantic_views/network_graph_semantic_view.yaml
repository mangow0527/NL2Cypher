metrics:
  service_count:
    name_zh: 服务数量
    description: 服务记录数量。
    aggregation: count
    target:
      entity: service
    expression: count(s)
    synonyms: [服务数量, 业务数量]
    default_alias: service_count
  tunnel_count:
    name_zh: 隧道数量
    description: 隧道记录数量。
    aggregation: count
    target:
      entity: tunnel
    expression: count(t)
    synonyms: [隧道数量]
    default_alias: tunnel_count
  network_element_count:
    name_zh: 网元数量
    description: 网元或网络设备记录数量。
    aggregation: count
    target:
      entity: network_element
    expression: count(ne)
    synonyms: [网元数量, 网络设备数量, 设备数量, 网元总数, 网络设备总数, 设备总数]
    default_alias: network_element_count
  port_count:
    name_zh: 端口数量
    description: 端口或接口记录数量。
    aggregation: count
    target:
      entity: port
    expression: count(p)
    synonyms: [端口数量, 接口数量, 端口总数, 接口总数]
    default_alias: port_count
  fiber_count:
    name_zh: 光纤数量
    description: 光纤记录数量。
    aggregation: count
    target:
      entity: fiber
    expression: count(f)
    synonyms: [光纤数量, 纤芯数量, 光纤总数, 纤芯总数]
    default_alias: fiber_count
  link_count:
    name_zh: 链路数量
    description: 链路记录数量。
    aggregation: count
    target:
      entity: link
    expression: count(l)
    synonyms: [链路数量, 连接数量, 链路总数]
    default_alias: link_count
  protocol_count:
    name_zh: 协议数量
    description: 协议记录数量。
    aggregation: count
    target:
      entity: protocol
    expression: count(proto)
    synonyms: [协议数量, 网络协议数量, 协议总数]
    default_alias: protocol_count
  avg_tunnel_latency:
    name_zh: 平均隧道时延
    description: 对隧道时延求平均值。
    aggregation: avg
    target:
      entity: tunnel
      field: latency
    expression: avg(t.latency)
    synonyms: [平均隧道时延, 平均时延]
    default_alias: avg_tunnel_latency
  max_tunnel_bandwidth:
    name_zh: 最大隧道带宽
    description: 对隧道带宽取最大值。
    aggregation: max
    target:
      entity: tunnel
      field: bandwidth
    expression: max(t.bandwidth)
    synonyms: [最大隧道带宽, 最大带宽]
    default_alias: max_tunnel_bandwidth

path_semantics:
  service.uses_tunnel:
    name_zh: 服务使用隧道
    description: 从服务到其承载隧道的一跳路径。
    source_entity: service
    target_entity: tunnel
    intermediate_entities: []
    path: [{relationship: service_uses_tunnel}]
    trigger_phrases: [使用的隧道, 服务使用隧道, 服务与隧道, 服务和隧道, 服务隧道对应关系, 服务与隧道的对应关系, 承载]
    negative_phrases: []
    default_return_fields: [service.name, tunnel.name]
  service.tunnel_path:
    name_zh: 服务隧道经过网元
    description: 从服务经过隧道到路径网元。
    source_entity: service
    target_entity: network_element
    intermediate_entities: [tunnel]
    path: [{relationship: service_uses_tunnel}, {relationship: path_through}]
    trigger_phrases: [经过网元, 路径经过, 所经过网元, 所经隧道穿过, 隧道穿过, 穿过的网元, 隧道路径中经过, 路径中经过]
    negative_phrases: [源网元, 目的网元]
    default_return_fields: [network_element.name]
  service.tunnel_path_ports:
