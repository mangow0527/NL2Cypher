version: 1
description: Intent and scenario aware business slot schemas for NL2Cypher semantic parsing.

schemas:
  - schema_id: graph_inventory.related_record
    scenario_id: ops_inventory_static
    primary_intent: record_retrieval_query
    secondary_intents: [related_record_query]
    description: 静态资产或配置关联明细查询。
    slots:
      - name: query_object
        description: 查询涉及的对象类型。
        required: true
        min_count: 2
        depend_slots: []
        priority: 100
        follow_up_question: 请明确关联查询涉及哪些对象，例如服务和隧道、设备和端口。
      - name: relationship_scope
        description: 对象之间的关系或路径语义。
        required: true
        min_count: 1
        depend_slots: [query_object]
        priority: 95
        follow_up_question: 请明确对象之间的关系，例如使用、拥有、经过或连接。
      - name: attribute_set
        description: 需要返回的字段集合。
        required: false
        min_count: 1
        depend_slots: [query_object]
        priority: 80
        follow_up_question: 需要返回哪些字段？

  - schema_id: graph_inventory.attribute_projection
    scenario_id: ops_inventory_static
    primary_intent: record_retrieval_query
    secondary_intents: [attribute_projection_query, entity_detail_query, entity_list_query]
    description: 静态资产或配置属性查询。
    slots:
      - name: query_object
        description: 查询对象类型。
        required: true
        min_count: 1
        depend_slots: []
        priority: 100
        follow_up_question: 请明确要查询哪类对象。
      - name: query_action
        description: 列表、详情或字段投影。
        required: true
        min_count: 1
        depend_slots: [query_object]
        priority: 95
        follow_up_question: 需要明细列表、单对象详情，还是指定字段？
      - name: attribute_set
        description: 关心的属性字段集合。
        required: false
        min_count: 1
        depend_slots: [query_object]
        priority: 85
        follow_up_question: 需要哪些字段（名称、ID、厂商、版本等）？

  - schema_id: graph_metric.scalar
    scenario_id: graph_static_metrics
    primary_intent: metric_query
    secondary_intents: [count_metric_query, numeric_metric_query, multi_metric_query]
    description: 当前图谱静态属性上的指标查询。
    slots:
      - name: query_object
        description: 指标承载对象类型。
        required: true
        min_count: 1
        depend_slots: []
        priority: 100
        follow_up_question: 请明确要统计哪类对象。
      - name: metric_family
        description: 指标或聚合口径。
        required: true
        min_count: 1
        depend_slots: [query_object]
        priority: 100
        follow_up_question: 请指定要计算的指标，例如数量、平均时延、最大带宽。
      - name: query_action
        description: 单值汇总或多指标汇总。
        required: true
        min_count: 1
        depend_slots: [query_object, metric_family]
        priority: 95
        follow_up_question: 需要单值汇总、列表、趋势，还是对比？

  - schema_id: graph_metric.breakdown
    scenario_id: graph_static_metrics
    primary_intent: breakdown_query
    secondary_intents: [single_dimension_breakdown_query, multi_dimension_breakdown_query, multi_metric_breakdown_query]
    description: 当前图谱静态属性上的分组指标查询。
    slots:
      - name: query_object
        description: 被统计对象类型。
        required: true
        min_count: 1
        depend_slots: []
        priority: 100
        follow_up_question: 请明确要分组统计哪类对象。
      - name: metric_family
        description: 分组后统计的指标。
        required: true
        min_count: 1
        depend_slots: [query_object]
        priority: 100
        follow_up_question: 请明确分组后统计哪个指标。
      - name: group_by_dimension
        description: 聚合维度。
        required: true
        min_count: 1
        depend_slots: [query_object, metric_family]
        priority: 90
        follow_up_question: 请明确按什么维度分组。

  - schema_id: graph_metric.ranking
    scenario_id: graph_static_metrics
    primary_intent: ranking_query
    secondary_intents: [attribute_ranking_query, metric_ranking_query, derived_metric_ranking_query]
    description: 当前图谱静态属性或指标上的 TopN/BottomN 查询。
    slots:
      - name: query_object
        description: 排名对象类型。
        required: true
        min_count: 1
        depend_slots: []
        priority: 100
        follow_up_question: 请明确要排名的对象。
      - name: order_topn
        description: 排序指标、排序方向和截断 N。
        required: true
        min_count: 1
        depend_slots: [query_object]
        priority: 95
        follow_up_question: 请说明 Top 几、按哪项指标排序、升序还是降序。

  - schema_id: graph_existence.relationship
    scenario_id: graph_existence
    primary_intent: existence_query
    secondary_intents: [relationship_existence_query]
    description: 图谱关系存在性判断。
    slots:
      - name: query_object
        description: 参与存在性判断的对象。
        required: true
        min_count: 2
        depend_slots: []
        priority: 100
        follow_up_question: 请明确要判断哪两个对象之间的关系。
      - name: relationship_scope
        description: 需要判断是否存在的关系。
        required: true
        min_count: 1
        depend_slots: [query_object]
        priority: 95
        follow_up_question: 请明确要判断的关系类型。
