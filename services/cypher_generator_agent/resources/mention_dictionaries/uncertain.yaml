version: 1
source_schema: services/testing_agent/docs/reference/schema.json
description: Items that need human review before entering the primary mention dictionaries.
entries:
  - candidate_id: UNC_ProtocolEmptyLiveData
    issue_type: data_coverage
    evidence:
      - schema.json defines Protocol as a vertex label.
      - Live TuGraph query returned zero distinct Protocol.ietf_category values.
    judgement: Keep Protocol in business_objects.yaml because it is schema-backed, but review whether it should be prioritized during matching while live data has no Protocol nodes.

  - candidate_id: UNC_EdgeProperty_HAS_PORT_admin_status
    issue_type: modeling_gap
    evidence:
      - schema.json defines edge property HAS_PORT.admin_status.
      - The requested attribute dictionary canonical form is Object.field, which does not naturally cover edge properties.
    judgement: Do not put HAS_PORT.admin_status into attributes.yaml yet. Consider a future relation-attribute dictionary if users ask about edge administrative status.

  - candidate_id: UNC_EdgeProperty_PATH_THROUGH_hop_order
    issue_type: modeling_gap
    evidence:
      - schema.json defines edge property PATH_THROUGH.hop_order.
      - hop_order is important for path sequence semantics but is not an object property.
    judgement: Keep hop_order as a relation surface form on REL_PATH_THROUGH for now; review whether path-order mentions need a dedicated edge-property dictionary.

  - candidate_id: UNC_LinkStatusValues
    issue_type: incomplete_enum
    evidence:
      - schema.json does not document Link.status enum values.
      - Live TuGraph currently returns only up for Link.status.
    judgement: Do not add LinkStatus values to attribute_values.yaml until the business enum is confirmed.

  - candidate_id: UNC_LinkTypeValues
    issue_type: incomplete_enum
    evidence:
      - schema.json does not document Link.elem_type enum values.
      - Live TuGraph currently returns only ethernet for Link.elem_type.
    judgement: Do not add LinkType values to attribute_values.yaml until the business enum is confirmed.

  - candidate_id: UNC_LinkProtocolScalar
    issue_type: semantic_ambiguity
    evidence:
      - schema.json defines Link.protocol as a scalar string property.
      - schema.json also defines TUNNEL_PROTO as a graph relationship from Tunnel to Protocol.
    judgement: Keep Link.protocol as an attribute because it is a real scalar property; make sure semantic composition does not confuse it with REL_TUNNEL_PROTO.

  - candidate_id: UNC_InstanceLikeValues
    issue_type: instance_values
    evidence:
      - Live TuGraph samples include VendorA, Site_01, VLAN IDs, RFC 3209, and 1550nm.
      - These look like instance values or pattern-constrained values rather than closed business enums.
    judgement: Do not inject these values into attribute_values.yaml automatically. If users commonly filter on them, add them through a reviewed value dictionary update.
