    primary_intent: existence_query
    secondary_intent: path_existence_query
    confidence: 0.97
    include_any:
      - 是否存在
      - 有没有
      - 是否有
      - 能否
      - 能不能
      - 是否能
    include_any_secondary:
      - 路径
      - 可达
      - 到达
