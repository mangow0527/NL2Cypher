version: 3
domain: nl2cypher_chatbi
description: >
  第一阶段意图识别规则种子。规则层只覆盖关键词非常明确、类别边界稳定的问题；
  未命中、低置信或多规则冲突时，应进入 embedding 阶段。

defaults:
  source: rule
  decision: accept
  no_match_decision: fallback_embedding
  conflict_decision: fallback_llm

rules:
