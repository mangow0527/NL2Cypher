server:
  port: 8080

spring:
  application:
    name: nl2cypher-system

nl2cypher:
  strong-model:
    provider: zhipu
    api-key: ${ZHIPU_API_KEY:your-zhipu-api-key}
    model: glm-4-plus
    temperature: 0.3
    max-tokens: 2048
    timeout: 30000

  weak-model:
    provider: local-qwen
    api-url: ${QWEN_API_URL:http://localhost:8000/v1/chat/completions}
    model: Qwen/Qwen2.5-32B-Instruct
    temperature: 0.7
    max-tokens: 1024
    timeout: 60000

  cache:
    enabled: true
    ttl: 3600

  validation:
    max-retries: 3
    confidence-threshold: 0.7

logging:
  level:
    com.nl2cypher: DEBUG
    org.springframework.web: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
